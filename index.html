<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnakeMania</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ===== START SCREEN ===== -->
    <div id="startScreen" class="overlay active" aria-label="Start game">
        <div class="overlay-content">
            <div class="game-logo">
                <span class="logo-icon" aria-hidden="true">🐍</span>
                <h1>SnakeMania</h1>
                <p class="subtitle">Classic snake, reimagined.</p>
            </div>

            <div class="difficulty-selector">
                <p class="section-label">Difficulty</p>
                <div class="diff-group" aria-label="Select difficulty">
                    <button class="diff-btn" data-speed="6"  aria-pressed="false">Easy</button>
                    <button class="diff-btn active" data-speed="10" aria-pressed="true">Normal</button>
                    <button class="diff-btn" data-speed="16" aria-pressed="false">Hard</button>
                    <button class="diff-btn" data-speed="22" aria-pressed="false">Insane</button>
                </div>
            </div>

            <button id="startBtn" class="btn btn-primary">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M3 2l10 6-10 6V2z"/></svg>
                Play
            </button>

            <p class="controls-hint">Arrow keys · P to pause · M to mute</p>
        </div>
    </div>

    <!-- ===== GAME OVER SCREEN ===== -->
    <div id="gameOverScreen" class="overlay" aria-label="Game over">
        <div class="overlay-content">
            <h2 class="overlay-title">Game Over</h2>

            <div class="result-grid">
                <div class="result-stat">
                    <span class="stat-label">Score</span>
                    <span class="stat-value" id="finalScore">0</span>
                </div>
                <div class="result-stat">
                    <span class="stat-label">Best</span>
                    <span class="stat-value" id="finalHiscore">0</span>
                </div>
            </div>

            <div id="newRecordBadge" class="new-record hidden" aria-live="polite">🏆 New Record!</div>

            <div class="btn-stack">
                <button id="restartBtn" class="btn btn-primary">Play Again</button>
                <button id="menuBtn" class="btn btn-secondary">Main Menu</button>
            </div>
        </div>
    </div>

    <!-- ===== PAUSE SCREEN ===== -->
    <div id="pauseScreen" class="overlay" aria-label="Game paused">
        <div class="overlay-content">
            <h2 class="overlay-title">Paused</h2>
            <p class="overlay-hint">Press P or tap Resume</p>
            <div class="btn-stack">
                <button id="resumeBtn" class="btn btn-primary">Resume</button>
                <button id="pauseMenuBtn" class="btn btn-secondary">Main Menu</button>
            </div>
        </div>
    </div>

    <!-- ===== GAME UI ===== -->
    <div class="game-wrapper">

        <!-- HUD -->
        <header class="hud" aria-label="Game HUD">
            <div class="hud-score">
                <span class="hud-label">SCORE</span>
                <span id="scoreBox" class="hud-value" aria-live="polite" aria-label="Score">0</span>
            </div>

            <span class="hud-title" aria-hidden="true">SnakeMania</span>

            <div class="hud-right">
                <div class="hud-score">
                    <span class="hud-label">BEST</span>
                    <span id="hiscoreBox" class="hud-value" aria-label="High score">0</span>
                </div>
                <button id="soundToggle" class="icon-btn" aria-label="Toggle sound" title="Toggle sound (M)">
                    <svg id="soundOnIcon"  width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    <svg id="soundOffIcon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" class="hidden"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
                </button>
                <button id="pauseBtn" class="icon-btn" aria-label="Pause game" title="Pause (P)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
            </div>
        </header>

        <!-- Board -->
        <main class="board-wrap">
            <div id="board" aria-label="Snake game board"></div>
            <div id="diffBadge" class="diff-badge" aria-label="Current difficulty">Normal</div>
        </main>

        <!-- Mobile D-Pad -->
        <nav class="dpad-wrap" aria-label="Mobile controls">
            <div class="dpad">
                <button class="dpad-btn" data-dir="up"    aria-label="Move up">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 8l-6 6 1.41 1.41L12 10.83l4.59 4.58L18 14z"/></svg>
                </button>
                <div class="dpad-row">
                    <button class="dpad-btn" data-dir="left"  aria-label="Move left">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/></svg>
                    </button>
                    <div class="dpad-center" aria-hidden="true"></div>
                    <button class="dpad-btn" data-dir="right" aria-label="Move right">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
                    </button>
                </div>
                <button class="dpad-btn" data-dir="down"  aria-label="Move down">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M16.59 8.59L12 13.17 7.41 8.59 6 10l6 6 6-6z"/></svg>
                </button>
            </div>
        </nav>

    </div>

    <script src="js/index.js"></script>
</body>
</html>
